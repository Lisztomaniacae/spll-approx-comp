seed: 42

paths:
  data_root: ./data
  outputs_root: ./outputs
  repo_root: ../haskell-dppl-main
  models_root: ./outputs/models
  model_selection_manifest: ./outputs/models/model_selection_manifest.json
  split_manifest: ./outputs/models/mnist_splits.pt
  training_root: ./outputs/training
  used_config_copy: ./outputs/config_used.yaml

training:
  device: auto
  require_mps: true
  train_ratio: 0.5
  test_ratio: 0.4
  inference_ratio: 0.1
  batch_size: 128
  eval_batch_size: 128
  num_workers: 0
  epochs: 12
  learning_rate: 0.001
  weight_decay: 0.0
  selection_mode: nearest
  target_tolerance: 0.03
  normalize:
    mean: 0.1307
    std: 0.3081

  # Extreme broken-prior profile used by the biased variants below.
  # Distribution: 50% ones, 2% nines, and 6% for each remaining digit.
  #
  # Why the biased variants use capped train/validation subsets instead of changing
  # the global train/test/inference split:
  # - the current pipeline uses one shared inference holdout for staging experiments,
  #   so keeping the global split unchanged preserves comparability for the baseline;
  # - with MNIST's finite class counts, the bottleneck is digit '1', not digit '9'.
  #
  # Conservative subset sizes chosen for the biased variants:
  # - max_train_examples: 7600
  # - max_validation_examples: 6000
  #
  # Required counts under this skew:
  # - train:      3800 ones, 152 nines
  # - validation: 3000 ones, 120 nines
  #
  # These fit safely inside the expected label counts of the current shared
  # 50%/40% split while leaving the common 10% inference holdout intact.
  extreme_biased_label_distribution: &extreme_biased_label_distribution
    0: 0.06
    1: 0.50
    2: 0.06
    3: 0.06
    4: 0.06
    5: 0.06
    6: 0.06
    7: 0.06
    8: 0.06
    9: 0.02

  # Base defaults inherited by each model variant unless overridden below.
  model:
    input_channels: 1
    num_classes: 10
    conv_channels: [32, 64]
    kernel_size: 3
    pool_kernel: 2
    fc_hidden: 128
    dropout: 0.25

  # Each variant is trained once and the exported checkpoint is the epoch
  # whose validation accuracy is closest to target_accuracy.
  # For low-accuracy targets, max_train_examples acts as a stable underfitting knob,
  # so you only need light YAML tuning rather than code changes.
  model_variants:
    - id: acc50
      target_accuracy: 0.50
      max_train_examples: 20000
      epochs: 15
      target_tolerance: 0.00
      model:
        conv_channels: [ ]
        fc_hidden: 2

    - id: acc50_biased_extreme
      target_accuracy: 0.50
      epochs: 15
      target_tolerance: 0.00
      max_train_examples: 7600
      max_validation_examples: 6000
      train_label_distribution: *extreme_biased_label_distribution
      validation_label_distribution: *extreme_biased_label_distribution
      train_sampling_with_replacement: false
      validation_sampling_with_replacement: false
      model:
        conv_channels: []
        fc_hidden: 2

    - id: acc70
      target_accuracy: 0.70
      max_train_examples: 20000
      target_tolerance: 0.00
      epochs: 15
      model:
        conv_channels: [ ]
        fc_hidden: 3

    - id: acc70_biased_extreme
      target_accuracy: 0.70
      epochs: 15
      target_tolerance: 0.00
      max_train_examples: 7600
      max_validation_examples: 6000
      train_label_distribution: *extreme_biased_label_distribution
      validation_label_distribution: *extreme_biased_label_distribution
      train_sampling_with_replacement: false
      validation_sampling_with_replacement: false
      model:
        conv_channels: []
        fc_hidden: 4

    - id: acc90
      target_accuracy: 0.90
      epochs: 15
      target_tolerance: 0.00
      model:
        conv_channels: [ ]
        fc_hidden: 8
        dropout: 0.1

    - id: acc90_biased_extreme
      target_accuracy: 0.90
      epochs: 15
      target_tolerance: 0.00
      max_train_examples: 7600
      max_validation_examples: 6000
      train_label_distribution: *extreme_biased_label_distribution
      validation_label_distribution: *extreme_biased_label_distribution
      train_sampling_with_replacement: false
      validation_sampling_with_replacement: false
      model:
        conv_channels: []
        fc_hidden: 7
        dropout: 0.1

inference:
  device: auto
  num_experiments: 1000
  terms_per_sum_min: 2
  terms_per_sum_max: 5
  sample_without_replacement_within_experiment: true
  top_predictions_to_store: 5
  # In this repo, -k/--topKCutoff is a probability cutoff in [0, 1], not a literal class count.
  # Use null for exact inference (no pruning).
  approximation_thresholds: [null, 0.00, 0.01, 0.05, 0.1, 0.25]
  # Thesis pipeline uses one approximate mode only: accumulated global path-mass cutoff.
  # `null` is the exact baseline (no pruning); all positive values below are global-cutoff runs.
  cutoff_modes: [global]
  # Compile with SPLL's -c/--countBranches so each posterior query also returns a branch count.
  count_branches: true
  force_recompile: true
  compile_timeout_sec: 3600
  stack_arch: x86_64
  show_progress: true
  show_inner_progress: false
